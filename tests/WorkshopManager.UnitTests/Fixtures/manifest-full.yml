name: Example Workshop
description: A comprehensive .NET workshop
technology:
  primary: dotnet
  version: "8.0"
  additional:
    - typescript
structure:
  modules:
    - path: modules/module-01
      code: src
      docs: README.md
      title: Getting Started
      order: 1
